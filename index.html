<!--
The header/formatting was largely taken from:

http://jeremymikkola.com/

This html file is the generic template for a page on my website.
It handles the style and what-not.
It can be used as a jinja2 template with the following components:

    - title (title of the page)
    - content_html (what should the actual content look like?)

-->

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Leland Bybee - Blog Posts</title>

    <style>
body {
    color: #220;
    font-family: 'Times New Roman', serif;
    font-size: 21px;
}

* {
    box-sizing: border-box;
}

div.container {
    margin: 0 auto;
    padding: 1rem 2rem;
    max-width: 48rem;
}

div.header {
    border-bottom: 2px solid #544;
    margin-bottom: 30px;
    padding: 12px 0px;
}

div.logo {
    float: left;
}

div.logo a {
    color: #555;
    font-size: 18px;
    font-weight: bold;
    text-decoration: none;
}

div.header .navigation {
    text-align: right;
}

div.header .navigation a {
    color: #555;
    font-size: 18px;
    font-weight: bold;
    margin-left: 12px;
    text-decoration: none;
    text-transform: uppercase;
}

div.content {
    margin-bottom: 80px;
    line-height: 1.6em;
}

div.footer {
    border-top: solid 2px black;
    color: #555;
    font-size: 12px;
    margin-top: 30px;
    padding: 12px 0px 12px 0px;
    text-align: right;
}

h1 {
    font-size: 25px;
}

h2 {
    font-size: 23px;
}

h3 {
    font-size: 21px;
}

h4 {
    font-size: 19px;
}

div.info {
    color: #555;
    font-size: 17px;
    font-style: italic;
}

span.kw {
    font-weight: bold;
    color: #004;
}

span.st {
    color: #040;
}

span.ot {
    color: #400;
}

span.dt {
    color: #640;
}

div.sourceCode, div#content>pre {
    border: 1px solid #DEDEDE;
    padding: 0.5em 1em;
    background-color: #FAFAFA;
    overflow: auto;
    font-size: 0.75em;
    font-family: mono;
}

div.sourceCode>pre {
    padding: 0;
    margin: 0;
}

p>code, li>code {
    background-color: #FAFAFA;
    font-size: 0.8em;
    font-family: mono;
    color: #994444;
}

.column {
    max-width: 100%;
}

.post {
    max-width: 100%;
}

@media (max-width: 600px) {
    body {
        font-size: 19px;
    }

    div.container {
        padding: 0.5rem 1rem 1rem 1rem;
    }

    div.header {
        padding-top: 0;
    }

    div.header div.logo {
        float: none;
        padding: 0.4rem 0;
    }

    div.header div.navigation {
        text-align: left;
        display: block;
    }

    div.header div.navigation a {
        margin-left: 0;
        margin-right: 1rem;
        padding: 0.2rem 0;
        font-size: 0.8rem;
    }

    .content .title {
        font-size: 1.5rem;
    }
}
</style>

<link rel="alternate" type="application/atom+xml" title="Leland Bybee - blog" href="../atom.xml">

</head>

<body>
<div class="container">
  <div id="header" class="header column">
    <div id="logo" class="logo column">
      <a href="../">Leland Bybee</a>
    </div>
    <div id="navigation" class="navigation column">
      <a href="../">Home</a>
      <a href="../about.html">About</a>
      <a href="../archive.html">Archive</a>
    </div>
  </div>

<div id="content" class="content column">
  <div class="post">
      <h1 class="title">Blog Posts</h1>

<!--
This html file contains the additional templating needed to produce
an index of blog posts.
It can be used as a jinja2 template with the following components:

    - sections
        - This is a dictionary where keys correspond to section labels
          and values correspond to dicts of blog posts references
        - The keys for the blog post references are the blog title
          and the values are the url

The resulting file will have a header for every section with a list
of corresponding blog posts
-->


<ul>
<li><a href="https://lbybee.github.io/posts/2019-03-22-test1.html">2019-03-22 test1</a></li>
</ul>

<ul>
<li><a href="https://lbybee.github.io/posts/2019-03-20-test0.html">2019-03-20 test0</a></li>
</ul>


</div>
</div>
